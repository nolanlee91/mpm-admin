<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>MPM Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #E6EDF3;
      background: #0B0E14;
      background-image:
        radial-gradient(900px 500px at 12% -8%, rgba(84,233,138,0.08), transparent 60%),
        radial-gradient(800px 500px at 100% 0%, rgba(146,204,255,0.06), transparent 55%);
      background-attachment: fixed;
      min-height: 100vh;
    }
    /* Smooth interactions everywhere */
    button, input, a { transition: background .15s ease, border-color .15s ease, box-shadow .15s ease, transform .12s ease, opacity .15s ease, filter .15s ease; }
    button:not(:disabled):hover { filter: brightness(1.06); }
    button:not(:disabled):active { transform: translateY(1px); }
    input:focus { outline: none; border-color: #54e98a !important; box-shadow: 0 0 0 3px rgba(84,233,138,0.14); }
    input::placeholder { color: #586069; }
    /* Table rows come alive on hover */
    tbody tr { transition: background .12s ease; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
    ::selection { background: rgba(84,233,138,0.28); }
    /* Slim dark scrollbars */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #21262D; border-radius: 6px; border: 2px solid #0B0E14; }
    ::-webkit-scrollbar-thumb:hover { background: #2c333d; }
    /* Gentle fade-in for mounted views */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .fade-up { animation: fadeUp .35s ease both; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
